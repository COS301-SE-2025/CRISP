name: Performance Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  workflow_dispatch:  # Manual trigger

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust

    - name: Start services
      run: |
        docker-compose up -d --build
        sleep 60  # Wait for services to be ready

    - name: Wait for application to be ready
      run: |
        timeout 120 bash -c 'until curl -f http://localhost:8000/admin/; do sleep 5; done'

    - name: Run performance tests
      run: |
        locust --headless --users 50 --spawn-rate 10 --run-time 5m --host http://localhost:8000 -f performance_tests/locustfile.py --html performance-report.html

    - name: Upload performance report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-report
        path: performance-report.html

    - name: Cleanup
      if: always()
      run: docker-compose down -v